<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Epoch Converter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      width: 360px;
      padding: 20px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 18px;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .tab-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .tab {
      flex: 1;
      padding: 7px 0;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #aaa;
      font-size: 13px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .tab.active {
      background: #2563eb;
      border-color: #2563eb;
      color: #fff;
    }

    .section { display: none; }
    .section.active { display: block; }

    label {
      display: block;
      font-size: 12px;
      color: #888;
      margin-bottom: 5px;
      margin-top: 12px;
    }

    input[type="date"],
    input[type="time"],
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #2563eb; }

    .row {
      display: flex;
      gap: 8px;
    }

    .row > div { flex: 1; }

    button.convert-btn {
      width: 100%;
      margin-top: 16px;
      padding: 9px;
      background: #2563eb;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.convert-btn:hover { background: #1d4ed8; }

    .result-box {
      margin-top: 14px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 14px;
    }

    .result-label {
      font-size: 11px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .epoch-value {
      font-size: 22px;
      font-weight: 700;
      color: #60a5fa;
      letter-spacing: 1px;
      word-break: break-all;
    }

    .copy-btn {
      margin-top: 8px;
      padding: 5px 12px;
      background: #262626;
      border: 1px solid #333;
      border-radius: 5px;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .copy-btn:hover { background: #2d2d2d; color: #fff; }
    .copy-btn.copied { color: #4ade80; border-color: #4ade80; }

    .error {
      margin-top: 10px;
      font-size: 12px;
      color: #f87171;
    }

    .now-btn {
      margin-top: 6px;
      padding: 4px 10px;
      background: transparent;
      border: 1px solid #333;
      border-radius: 5px;
      color: #888;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .now-btn:hover { color: #fff; border-color: #555; }

    hr { border: none; border-top: 1px solid #222; margin: 14px 0 0; }

    .toggle-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .toggle-label {
      font-size: 12px;
      color: #aaa;
      line-height: 1.3;
    }

    .toggle-label span {
      display: block;
      font-size: 11px;
      color: #555;
      margin-top: 2px;
    }

    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #333;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 14px;
      width: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: #2563eb; }
    input:checked + .slider:before { transform: translateX(16px); }
  </style>
</head>
<body>
  <h1>Epoch Converter</h1>

  <div class="toggle-bar">
    <div class="toggle-label">
      Selection converter
      <span>Select any epoch on a page to convert it</span>
    </div>
    <label class="switch">
      <input type="checkbox" id="selection-toggle" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="tab-row">
    <div class="tab active" id="tab-ist" data-tab="ist">IST</div>
    <div class="tab" id="tab-gmt" data-tab="gmt">GMT / UTC</div>
    <div class="tab" id="tab-epoch" data-tab="epoch">Epoch → Date</div>
  </div>

  <!-- IST Section -->
  <div class="section active" id="section-ist">
    <div class="row">
      <div>
        <label>Date (IST)</label>
        <input type="date" id="ist-date" />
      </div>
      <div>
        <label>Time (IST)</label>
        <input type="time" id="ist-time" step="1" />
      </div>
    </div>
    <button class="now-btn" id="now-ist">Use current IST time</button>
    <button class="convert-btn" id="convert-ist">Convert to Epoch</button>
    <div id="ist-result" class="result-box" style="display:none"></div>
    <div id="ist-error" class="error"></div>
  </div>

  <!-- GMT Section -->
  <div class="section" id="section-gmt">
    <div class="row">
      <div>
        <label>Date (GMT/UTC)</label>
        <input type="date" id="gmt-date" />
      </div>
      <div>
        <label>Time (GMT/UTC)</label>
        <input type="time" id="gmt-time" step="1" />
      </div>
    </div>
    <button class="now-btn" id="now-gmt">Use current UTC time</button>
    <button class="convert-btn" id="convert-gmt">Convert to Epoch</button>
    <div id="gmt-result" class="result-box" style="display:none"></div>
    <div id="gmt-error" class="error"></div>
  </div>

  <!-- Epoch → Date Section -->
  <div class="section" id="section-epoch">
    <label>Unix Epoch (seconds or milliseconds)</label>
    <input type="text" id="epoch-input" placeholder="e.g. 1712345678 or 1712345678000" />
    <button class="convert-btn" id="convert-epoch">Convert to Date</button>
    <div id="epoch-result" class="result-box" style="display:none"></div>
    <div id="epoch-error" class="error"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
